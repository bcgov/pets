{{ $kcSecretName := printf "%s-%s" (include "cdogs.fullname" .) "keycloak" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cdogs.fullname" . }}
  labels:
    {{- include "cdogs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # In a Deployment, this controls how many old ReplicaSets to keep
  revisionHistoryLimit: 10

  selector:
    matchLabels:
      {{- include "cdogs.selectorLabels" . | nindent 6 }}

  strategy:
    type: RollingUpdate
    # (Optional) If you want custom rollingUpdate behavior, uncomment and adjust:
    # rollingUpdate:
    #   maxUnavailable: 25%
    #   maxSurge: 25%

  template:
    metadata:
      labels:
        {{- include "cdogs.selectorLabels" . | nindent 8 }}
      # If you need to force a redeploy when a ConfigMap changes, you can add, e.g.:
      # annotations:
      #   checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{ toYaml . | nindent 8 }}
      {{- end }}

      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "cdogs.serviceAccountName" . }}
      {{- end }}

      {{- with .Values.podSecurityContext }}
      securityContext:
        {{ toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: app
          {{- with .Values.securityContext }}
          securityContext:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          image: {{- if .Values.image.full }}
           "{{ .Values.image.full }}"
          {{- else }}
            "{{ .Values.image.repository }}/{{ .Chart.Name }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP

          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: {{ .Values.route.path }}
              port: {{ .Values.service.port }}
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 1

          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: {{ .Values.route.path }}
              port: {{ .Values.service.port }}
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 1

          resources:
            {{ toYaml .Values.resources | nindent 12 }}

          env:
            - name: NODE_ENV
              value: production

            {{- if or .Values.features.authentication .Values.config.configMap.KC_ENABLED }}
            - name: KC_CLIENTID
              valueFrom:
                secretKeyRef:
                  name: {{ include "cdogs.configname" . }}-keycloak
                  key: username
            - name: KC_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cdogs.configname" . }}-keycloak
                  key: password
            {{- end }}

            {{- if .Values.fluentBit.enabled }}
            - name: SERVER_LOGFILE
              value: /var/log/app.log
            {{- end }}

          envFrom:
            - configMapRef:
                name: {{ include "cdogs.configname" . }}-config

          volumeMounts:
            - name: file-cache-data
              mountPath: /var/lib/file-cache/data

            {{- if .Values.fluentBit.enabled }}
            - name: log-storage
              mountPath: /var/log
            {{- end }}

        {{- if .Values.fluentBit.enabled }}
        - name: fluent-bit
          {{- with .Values.securityContext }}
          securityContext:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.fluentBit.image.repository }}/{{ .Values.fluentBit.image.name }}:{{ .Values.fluentBit.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.fluentBit.service.metrics.port }}
              name: {{ .Values.fluentBit.service.metrics.name }}
              protocol: TCP
            - containerPort: {{ .Values.fluentBit.service.httpPlugin.port }}
              name: {{ .Values.fluentBit.service.httpPlugin.name }}
              protocol: TCP

          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: {{ .Values.fluentBit.route.metrics.path }}
              port: {{ .Values.fluentBit.service.metrics.port }}
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 1

          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: {{ .Values.fluentBit.route.metrics.path }}
              port: {{ .Values.fluentBit.service.metrics.port }}
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 1

          resources:
            {{ toYaml .Values.fluentBit.resources | nindent 12 }}

          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "cdogs.configname" . }}-aws
                  key: username
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cdogs.configname" . }}-aws
                  key: password

            {{- if .Values.fluentBit.enabled }}
            - name: SERVER_LOGFILE
              value: /var/log/app.log
            {{- end }}

          volumeMounts:
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc/
            - name: log-storage
              mountPath: /var/log
        {{- end }}

      restartPolicy: Always
      terminationGracePeriodSeconds: 30

      volumes:
        - name: file-cache-data
          {{- if .Values.persistentVolumeClaim.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cdogs.configname" . }}-cache
          {{- else }}
          emptyDir: {}
          {{- end }}

        {{- if .Values.fluentBit.enabled }}
        - name: log-storage
          emptyDir: {}
        - name: fluent-bit-config
          configMap:
            name: {{ include "cdogs.configname" . }}-fluent-bit
        {{- end }}
